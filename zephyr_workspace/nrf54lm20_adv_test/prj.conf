# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54LM20_Test"

# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Disable UART/logging for clean measurement
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n

# GPIO for optional LED heartbeat
CONFIG_GPIO=y

# System
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_NRF_GRTC_START_SYSCOUNTER=y
