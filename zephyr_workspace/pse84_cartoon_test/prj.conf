CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_I2C=y
CONFIG_PINCTRL=y
CONFIG_SHELL=y
CONFIG_I2C_SHELL=y
CONFIG_USE_INFINEON_GFXSS=y
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y
CONFIG_MAIN_STACK_SIZE=16384

# Match enable_cm55 companion: route SMIF0 through the 128 MB Octal NOR.
# The M33 secure companion performs the actual Cy_SMIF_Init transition;
# the M55 needs the same Kconfig set so CMakeLists.txt in zephyr-ifx-cycfg
# compiles the octal cycfg_qspi_memslot_octal.c instead of the quad file.
CONFIG_INFINEON_SMIF_OCTAL=y
