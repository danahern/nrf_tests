# Minimal M33 companion: only job is to boot CM55 and do the one-time
# system clock setup via the Infineon clock driver (including bringing up
# clk_ext for the DSI D-PHY PLL reference). SERIAL is disabled because
# PPC isn't configured to allow M33 access to SCB2 until soc_late_init_hook
# runs (which is AFTER driver probe); matching the pse84_display/companion
# pattern: empty companion, no printk from M33.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_BOOT_BANNER=n
CONFIG_PRINTK=n

# Switch SMIF0 from Quad SDR (ROM default) to Octal DDR during the M33
# companion's ifx_pse84_cm55_startup, before cy_mpc_init and before CM55
# is released. This selects the patched cycfg_qspi_memslot_octal.c,
# pulls in the SMIF HAL (USE_INFINEON_SMIF), and bumps the M55 SMIF0 MPC
# region from 11 MB to 58 MB so the octal 64 MB aperture is usable.
CONFIG_INFINEON_SMIF_OCTAL=y

