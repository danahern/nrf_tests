# PSE84 Voice Assistant — M33 Non-Secure companion base config.
#
# Phase 0c: moved off of the Secure-M33 slot (whose flashes weren't
# landing because extended-boot caches the M33S image in RRAM) onto
# M33NS with TF-M as the Secure image. TF-M handles SE handoff + CM55
# release; Zephyr NS runs the app logic and owns uart2 after handoff.

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_BOOT_BANNER=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096

# printk goes direct to uart rather than into LOG deferred mode.
CONFIG_LOG_PRINTK=n

# M55 log tunnel peer: icmsg over the infineon,pse84-mbox driver.
CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
