# QEMU Cortex-M55 smoke-test build for pse84_assistant.
#
# Target: mps3/corstone300/an547 (Arm MPS3 Corstone-300, AN547 image,
# Cortex-M55 with Armv8.1-M MVE-I/MVE-F/FPU + PMU). Runs under QEMU
# (`west build -t run`) so the state machine + framing + Opus code
# paths can be smoke-tested on a real M55 ISA without flashing HW.
#
# No display + no input on this QEMU model:
#   - CONFIG_LVGL=n  -> ui.c is excluded by CMakeLists (see app
#     CMakeLists.txt) and main.c compiles its headless branch.
#   - a k_timer in main.c cycles state_cycle() every 1 s, printing
#     transitions via LOG_INF to UART0 (QEMU -serial stdio).
#
# Build + run:
#   west build -b mps3/corstone300/an547 -d build_qemu_m55 \
#       -s zephyr_workspace/pse84_assistant -p always \
#       -- -DCONF_FILE=prj_qemu_m55.conf
#   west build -d build_qemu_m55 -t run
#
# Expected UART output (one second apart):
#   *** Booting Zephyr OS ...
#   === PSE84 Assistant (Phase 1) ===
#   headless mode: cycling state every 1000 ms
#   state: IDLE -> LISTENING
#   headless tick -> LISTENING
#   state: LISTENING -> THINKING
#   headless tick -> THINKING
#   ...

# --- Core kernel + logging ---
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# --- Exercise the codec path on the M55 toolchain ---
# Forces libopus sources to compile for Armv8.1-M with MVE enabled. This
# is the whole reason Track D exists — uncovers any MVE intrinsic / fixed
# point / stack-size regressions before they hit real HW.
CONFIG_OPUS=y

# libopus encoder/decoder structs are large; match tests/opus_roundtrip
# sizing so downstream k_malloc() calls in opus_wrapper succeed.
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=16384

# --- Everything display / input / PSE84-specific OFF ---
# No GFXSS, no octal flash, no I2C panel bridge, no gpio_keys, no LVGL.
# The defaults handle this (all of the above are n by default on
# mps3/corstone300/an547) but state them explicitly to document intent.
CONFIG_LVGL=n
CONFIG_DISPLAY=n
CONFIG_INPUT=n
