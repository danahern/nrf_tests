# Audio-iteration debug build. Overlays prj.conf via EXTRA_CONF_FILE.
#
# Strips the 24 MiB of sprite assets out of the image so each flash-over-
# KitProg3 cycle takes ~5 s instead of ~5 min. Keeps procedural animations
# so the state machine still has visible feedback on the display.
#
# Use with:
#   west build -b kit_pse84_eval/pse846gps2dbzc4a/m55 --sysbuild \
#       -d build_hw -s zephyr_workspace/pse84_assistant \
#       -- -DEXTRA_CONF_FILE=prj_audio_debug.conf

CONFIG_APP_ANIMATION_SPRITES=n
CONFIG_APP_ANIMATION_PROCEDURAL=y

# Disable the Zephyr shell so src/link.c can own the console UART RX path
# (the host bridge writes TEXT_CHUNK / TEXT_END frames back over the same
# serial port that carries the PCM dump outbound). With CONFIG_SHELL=y
# the shell subsystem grabs every RX byte and our frame parser gets
# nothing.
CONFIG_SHELL=n
CONFIG_I2C_SHELL=n

# Required for src/link.c's uart_irq_callback_set path.
CONFIG_UART_INTERRUPT_DRIVEN=y

# Phase 0b.3/4: enable ipc_service + icmsg backend on top of our
# infineon,pse84-mbox driver. At this point there's no app-level
# endpoint registration — the subsystem just initialises and waits
# for a peer. That peer will be the M33 companion once 0b.5/0b.6
# unblock real M33 application logic.
CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y

# Phase 0b.8: M33 owns uart2 console. M55 disables its own UART log
# backend and routes LOG_INF/WRN/ERR over the 'assistant' ipc_service
# endpoint. log_tunnel.c installs a custom LOG_BACKEND that ipc_sends
# every log line; the M33 main() prints received bytes to its printk.
# Direct printk() on M55 (audio.c hex dump) still hits uart2 — short
# windows of dual-owner contention are tolerable for that path.
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_OUTPUT=y
# Route printk through LOG subsys so it goes via the log_tunnel → M33
# path along with LOG_INF. Without this, printk writes direct to SCB2
# and collides with M33's tunnel-forwarded log writes — silently
# dropped output. Phase 4 BLE bring-up depends on visible printks.
CONFIG_LOG_PRINTK=y

# Phase 4 — BLE host on M55 (CYW55513 via SCB4 HCI UART).
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="PSE84-Assistant"
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_HCI_ACL_FLOW_CONTROL=y
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255
# Bigger BT RX/host stacks — CYW55513 firmware-download path wants room.
CONFIG_BT_HCI_TX_STACK_SIZE=1024
CONFIG_BT_RX_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_ISR_STACK_SIZE=1024
CONFIG_IDLE_STACK_SIZE=320
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_L2CAP_TX_BUF_COUNT=2
# Shrink more to cram inside M55's 132 KB RAM (audio ring is 64 KB).
CONFIG_LOG_BUFFER_SIZE=1024
CONFIG_BT_ATT_TX_COUNT=2
# Use Zephyr's H4 driver in hw-flow mode.
CONFIG_BT_HCI_RAW_H4=n
CONFIG_BT_LL_SW_SPLIT=n
# Defensive: H4 needs UART async API.
CONFIG_UART_ASYNC_API=y
