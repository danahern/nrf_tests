# PSE84 Voice Assistant — Phase 0a scaffold.
#
# Inherits the cartoon_test display pipeline (GFXSS + DSI + octal flash) and
# replaces the raw frame replay with LVGL + a gpio_keys button toggle.

# Core peripherals (unchanged from cartoon_test)
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_I2C=y
CONFIG_PINCTRL=y
CONFIG_SHELL=y
CONFIG_I2C_SHELL=y

# Display: GFXSS ships display_driver_api in-tree; no shim needed.
CONFIG_USE_INFINEON_GFXSS=y
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y

# Octal NOR flash (58 MB usable XIP aperture via extended boot policy) +
# HyperRAM PSRAM (16 MB at 0x64000000). Both verified working on kit_pse84_eval
# as of 2026-04-12 (see memory project_pse84_octal_enabled.md and
# project_pse84_psram.md). Must match enable_cm55.conf on the M33 companion.
CONFIG_INFINEON_SMIF_OCTAL=y
CONFIG_INFINEON_SMIF_PSRAM=y

# LVGL — Phase 1 widgets: label + procedural per-state animations
# (idle orb, listening bars via flex, thinking spinner/arc, responding label).
CONFIG_LVGL=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_SPINNER=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_FLEX=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_Z_MEM_POOL_SIZE=49152
CONFIG_LV_Z_VDB_SIZE=10
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_USE_LOG=y

# Input subsystem — gpio_keys reports INPUT_KEY_0 events on sw0.
CONFIG_INPUT=y

# Logging + stack sizing — LVGL allocates generously during first draw.
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=16384

# Phase 2: PDM mic capture (mono 16 kHz 16-bit → ring buffer → UART hex dump).
# Driver: drivers/audio/dmic_infineon.c (compatible = infineon,pdm).
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# DMA backend the Infineon PDM driver pulls its RX blocks through.
CONFIG_DMA=y

# The hex-dump path uses printk() directly (log subsystem would drop
# bytes under sustained 64 KB bursts); keep the log backend on for
# diagnostics but don't rely on it for the payload. LOG_PRINTK=n forces
# printk() to write to the raw UART console instead of enqueuing into
# the log ring buffer — critical for the ~128 KB PCM hex dump.
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=n

# Dedicated audio thread needs its own stack (DMIC read buffer pointers
# only, so 2 KB is plenty).
# See src/audio.c — AUDIO_THREAD_STACK_SIZE.
