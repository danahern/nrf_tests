# Per-board overlay for the opus_roundtrip suite on mps3/corstone300/an547.
#
# M55 Track D surprise: libopus's SILK PLC path (exercised by
# test_plc_accepts_zero_length_input) allocates ~20+ KB of stack frames
# during decode on Armv8.1-M — AAPCS prologues + MVE register-save
# areas are chunkier than native_sim's x86-64 compressed frames. The
# default CONFIG_ZTEST_STACK_SIZE=16384 (from ../prj.conf) overflows
# the ztest thread and raises a USAGE FAULT.
#
# Push both the main stack and the ztest thread stack to 32 KB on this
# board only; native_sim is unaffected.
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_ZTEST_STACK_SIZE=32768
