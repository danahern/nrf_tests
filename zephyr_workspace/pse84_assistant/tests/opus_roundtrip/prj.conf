CONFIG_ZTEST=y
CONFIG_ASSERT=y
CONFIG_OPUS=y
CONFIG_LOG=y

# The encoder/decoder state structs are large (~30 KB encoder, ~20 KB
# decoder). k_malloc pulls from the system heap; give it plenty of room
# and push the main stack out so we can keep a 320-sample PCM buffer
# and a 20 ms Opus packet on-stack during tests.
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_ZTEST_STACK_SIZE=16384

# Enable %f in TC_PRINT / printk so the sine roundtrip can report its
# measured RMS ratio on failure. Without this Zephyr's cbprintf silently
# emits the literal format string for float args.
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_REQUIRES_FLOAT_PRINTF=y
