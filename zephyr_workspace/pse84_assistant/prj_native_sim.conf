# native_sim build config for pse84_assistant.
#
# Keeps prj.conf pristine for the HW target. This config turns off all
# PSE84-specific peripherals (GFXSS, I2C, octal flash, shell) and picks up
# the in-tree SDL display + SDL-emulated GPIO so the LVGL + button toggle
# can be verified visually on macOS with:
#
#   west build -b native_sim -d build_native \
#     -s zephyr_workspace/pse84_assistant -- -DCONF_FILE=prj_native_sim.conf
#   ./build_native/zephyr/zephyr.exe

# Core
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Display (SDL)
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y

# LVGL — mirror prj.conf's UI-visible knobs so main.c renders identically.
CONFIG_LVGL=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_Z_MEM_POOL_SIZE=32768
# native_sim SDL display runs RGBA8888; 32-bit matches without conversion.
CONFIG_LV_COLOR_DEPTH_32=y
CONFIG_LV_USE_LOG=y

# Input — gpio_keys → INPUT_KEY_0, same code path as HW.
CONFIG_INPUT=y

# Logging + stack sizing
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=16384
