# M33NS companion sysbuild config (Phase 0c).
#
# Layers on top of pse84_assistant_m33ns/prj.conf. TF-M now owns the
# Secure M33 slot and handles SE handoff, CM55 release, and SMIF /
# PSRAM aperture setup via the provisioned OEM policy — so this file
# only needs to layer on the knobs sysbuild's image-level machinery
# relies on.

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_BOOT_BANNER=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_LOG_PRINTK=n

CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
