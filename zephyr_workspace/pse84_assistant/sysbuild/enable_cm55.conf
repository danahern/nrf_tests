# Minimal M33 companion: only job is to boot CM55 and do the one-time
# system clock setup via the Infineon clock driver (including bringing up
# clk_ext for the DSI D-PHY PLL reference). SERIAL is disabled because
# PPC isn't configured to allow M33 access to SCB2 until soc_late_init_hook
# runs (which is AFTER driver probe); matching the pse84_display/companion
# pattern: empty companion, no printk from M33.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_BOOT_BANNER=n
CONFIG_PRINTK=n
CONFIG_INFINEON_SMIF_OCTAL=y
# CONFIG_INFINEON_SMIF_PSRAM=y  # WIP — SMIF1 init hangs (needs power cycle to recover)

