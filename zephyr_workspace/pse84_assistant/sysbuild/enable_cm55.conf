# M33 companion: boots CM55, does the one-time clock + SMIF setup, and
# enables the PSRAM + octal NOR apertures before handing off to M55.
#
# **M33 console disabled.** Root cause documented in
# docs/pse84_m33_secure_uart_fault.md (BFAR=0x529A0000 = SCB2 Secure
# alias). After cy_ppc_init flips PERI0 regions to NS, M33 Secure side
# loses access to SCB2 via Secure alias. Zephyr's Cy PDL uart driver
# uses the Secure alias on Secure builds, so any printk → uart_poll_out
# bus-faults — escalates to HardFault, lockup, M33 dead in handler.
# Until we either skip SCB2 in PPC re-attribution OR teach the uart
# driver to use the NS alias, M33 stays silent.
CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
# CONFIG_SERIAL is not set
# CONFIG_CONSOLE is not set
# CONFIG_UART_CONSOLE is not set
# CONFIG_BOOT_BANNER is not set
# CONFIG_PRINTK is not set

# Tick source: use internal Cortex-M SysTick instead of MCWDT-based
# INFINEON_LP_TIMER. MCWDT registers live in PERI0 (Secure alias
# 0x52xxxxxx) which cy_ppc_init re-attributes to NS — M33 Secure
# access bus-faults on next k_sleep / timer query. CORTEX-M SysTick
# is CPU-internal (PPB region), unaffected by PPC.
CONFIG_INFINEON_LP_TIMER_PDL=n
CONFIG_CORTEX_M_SYSTICK=y

# Disable spinlock validator. The cy_ipc-internal locks (PIPE,
# SEMA) aren't z_spin_lock_set_owner-clean — every IPC operation
# triggers asserts that wedge M33 in spinlock_validate.c.
CONFIG_SPIN_VALIDATE=n

# PSRAM: triggers ifx_pse84_psram_init on the M33 side, sets up MPC for M55.
CONFIG_INFINEON_SMIF_PSRAM=y

# CONFIG_INFINEON_SMIF_OCTAL=y on the M33 companion is NOT for a runtime
# transition (extended boot handles that now per the OEM policy,
# smif_chip_select=0 / smif_data_width=8). It's required for:
#   - M55 MPC region sizing (11 MB -> 58 MB in pse84_s_protection.c)
#   - cycfg_qspi_memslot selection (S28HS01GT_SMIF0_SlaveSlot_0)
# See docs/pse84_octal_policy_enablement.md.
CONFIG_INFINEON_SMIF_OCTAL=y

# Gate in sysbuild.cmake only forces CONFIG_SOC_PSE84_M55_ENABLE=y on
# the samples/basic/minimal fallback companion; when we supply our
# own <APP>_m33 dir we must set it explicitly, otherwise
# ifx_pse84_cm55_startup doesn't run, CM55 stays in CPU_WAIT, and
# the display stays dark.
CONFIG_SOC_PSE84_M55_ENABLE=y
