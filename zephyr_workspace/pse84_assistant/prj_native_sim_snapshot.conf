# Snapshot-capture native_sim config.
#
# Extends prj_native_sim.conf: same display + LVGL + input stack, plus
# CONFIG_APP_SNAPSHOT=y (which implies CONFIG_LV_USE_SNAPSHOT=y). Run
# via tools/capture_snapshots.sh; the resulting binary exits itself via
# nsi_exit(0) once all four state PPMs have been written.
#
# This file intentionally re-declares the base prj_native_sim.conf
# contents rather than using a CONF_FILE list, because -DCONF_FILE=<one>
# is the simplest invocation inside the existing docker recipes.

# Core
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Display (SDL). SDL is still initialised so LVGL has a display driver
# attached, but the capture loop never pumps SDL events — we rely on
# timer-driven state_set() calls, not keyboard input.
CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y

# LVGL
CONFIG_LVGL=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_SPINNER=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_FLEX=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_Z_MEM_POOL_SIZE=1048576
CONFIG_LV_COLOR_DEPTH_32=y
CONFIG_LV_USE_LOG=y

# Snapshot (PPM writer).
CONFIG_APP_SNAPSHOT=y
CONFIG_LV_USE_SNAPSHOT=y

# Input — still wired so the gpio_keys DT node compiles cleanly, but the
# snapshot loop doesn't press anything.
CONFIG_INPUT=y

# Logging + stack sizing. snapshot.c allocates a 3 KB row scratch buffer
# on the stack, plus lv_snapshot_take() can use some; keep main's stack
# generous.
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=32768
