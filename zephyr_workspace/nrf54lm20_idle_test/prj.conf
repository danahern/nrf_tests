# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Disable everything for lowest power
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_BT=n
CONFIG_GPIO=n

# Enable GRTC for RTC wakeup
CONFIG_NRF_GRTC_START_SYSCOUNTER=y

# Minimal system
CONFIG_MAIN_STACK_SIZE=1024
