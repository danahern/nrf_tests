# M33 companion: boots CM55, does the one-time clock + SMIF setup, and
# enables the PSRAM + octal NOR apertures before handing off to M55.
#
# Mirrors pse84_psram_test's proven-working config as of 2026-04-12
# (see memory project_pse84_psram.md and project_pse84_octal_enabled.md).
# SERIAL=y is safe on M33 now — the earlier Phase 0a hardfault RCA was
# based on a stale tree; the upstream soc code reorg around extended boot
# (commit 7817ae63 and later) resolved the PPC ordering issue that
# previously made CONFIG_SERIAL=y fault before soc_late_init_hook.
CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_BOOT_BANNER=y
CONFIG_PRINTK=y

# PSRAM: triggers ifx_pse84_psram_init on the M33 side, sets up MPC for M55.
CONFIG_INFINEON_SMIF_PSRAM=y

# CONFIG_INFINEON_SMIF_OCTAL=y on the M33 companion is NOT for a runtime
# transition (extended boot handles that now per the OEM policy,
# smif_chip_select=0 / smif_data_width=8). It's required for:
#   - M55 MPC region sizing (11 MB -> 58 MB in pse84_s_protection.c)
#   - cycfg_qspi_memslot selection (S28HS01GT_SMIF0_SlaveSlot_0)
# See docs/pse84_octal_policy_enablement.md.
CONFIG_INFINEON_SMIF_OCTAL=y
