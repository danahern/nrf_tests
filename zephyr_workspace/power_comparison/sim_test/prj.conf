# QEMU boot validation test
# BLE disabled — no HCI controller in QEMU without external bt-server
# BLE correctness is validated by successful compilation for real targets

CONFIG_BT=n

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096
