# PSE84 Voice Assistant — M33 companion base config.
#
# Mirrors the known-working M33 companion config from
# pse84_psram_test/sysbuild/enable_cm55.conf and pse84_assistant/
# sysbuild/enable_cm55.conf. SERIAL / PRINTK are safe now that the
# Phase 0b.6 hardfault fix (soc/pse84/pse84_boot.c __disable_irq()
# before cy_ppc_unsecure_init) landed on the Zephyr fork at
# fae9ce777c6 — the M33 no longer takes a Secure vector fetch fault
# after CM55 handoff.
#
# sysbuild/enable_cm55.conf still layers on top of this via the
# kit_pse84_eval sysbuild machinery — redundant but harmless.

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_BOOT_BANNER=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096

# SMIF enablement for 64 MB octal NOR + 16 MB HyperRAM PSRAM.
# Extended boot policy handles the SMIF0 transition; this only sizes
# the MPC regions and selects cycfg memslots for M55 use.
CONFIG_INFINEON_SMIF_PSRAM=y
CONFIG_INFINEON_SMIF_OCTAL=y
