# PSE84 Voice Assistant — M33 companion (silent + IPC tunnel).
#
# Console/SERIAL deliberately omitted. The M33 root-cause hardfault
# (BFAR=0x529A0000, see embedded/docs/pse84_m33_secure_uart_fault.md)
# only triggers on Secure-alias accesses. The mbox driver uses the
# NS alias (0x422A0000) per the M33 board overlay, so MBOX + IPC are
# safe even after cy_ppc_init flips PERI0 to NS.

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_MAIN_STACK_SIZE=4096

# IPC tunnel to M55 (silent — M33 has no console, so ep_recv stores
# bytes in shared SOCMEM rather than printing them).
CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
