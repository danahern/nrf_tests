# PSE84 Voice Assistant — M33 companion, minimal silent pattern.
#
# M33 cannot probe any peripheral before ifx_pse84_cm55_startup
# attributes it in soc_late_init_hook. Driver init runs BEFORE that
# hook, so every peripheral driver enabled here will try to touch
# its SCB/MBOX/etc. register block and bus-fault. That fault kills
# M33 before it can run the CM55 release, which in turn leaves
# CM55 stuck in CPU_WAIT (PC=0x0003ff00) and the display dark.
#
# Observed breakages when enabled:
#   CONFIG_SERIAL / CONFIG_CONSOLE / CONFIG_UART_CONSOLE — SCB2 probe
#   CONFIG_MBOX + CONFIG_IPC_SERVICE                     — pse84_mbox probe
#
# Keep M33 lean: GPIO + PINCTRL + CLOCK_CONTROL only. IPC/MBOX get
# added back once we have a defer-until-late-init story.

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_CLOCK_CONTROL=y
CONFIG_MAIN_STACK_SIZE=4096
