CONFIG_BT=y
CONFIG_BT_CUSTOM=y
CONFIG_GPIO=y

CONFIG_BLE_DEVICE_NAME="Alif_B1_Test"

# Entropy for BLE randomizer
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Larger heaps for L2CAP throughput
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_ALIF_BLE_HOST_ADDL_PRF_HEAPSIZE=10240
CONFIG_ALIF_BLE_HOST_ADDL_ENV_HEAPSIZE=8192

# Disable logging for clean power measurement
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=2048
